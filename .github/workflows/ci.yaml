name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "server/pyproject.toml"
      - name: Install dependencies
        run: |
          cd server
          uv sync
      - name: Run tests
        run: |
          cd server
          export OWNER_TOKEN=test_token
          export WORKER_TOKEN=test_token
          export DATABASE_URL=sqlite:///:memory:
          export SECURE_COOKIES=false
          uv run pytest

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: worker/go.sum
      - name: Install dependencies
        run: |
          cd worker
          go mod download
      - name: Run tests
        run: |
          cd worker
          go test ./...

  validate-render-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate render.yaml
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: render.yaml
          config_data: |
            extends: default
            rules:
              line-length: disable
