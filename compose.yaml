services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: deaddrop
      POSTGRES_USER: deaddrop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deaddrop -d deaddrop"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - deaddrop-data:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: server
    environment:
      DATABASE_URL: postgresql://deaddrop:${POSTGRES_PASSWORD}@database:5432/deaddrop
      OWNER_TOKEN: ${OWNER_TOKEN:?set OWNER_TOKEN}
      WORKER_TOKEN: ${WORKER_TOKEN:?set WORKER_TOKEN}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  deaddrop-data:
