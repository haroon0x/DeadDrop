services:
  - type: web
    name: deaddrop
    runtime: docker
    dockerfilePath: server/Dockerfile
    dockerContext: server
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: OWNER_TOKEN
        sync: false
      - key: WORKER_TOKEN
        sync: false
      - key: SECURE_COOKIES
        value: true
      - key: DATABASE_URL
        sync: false
