<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="DeadDrop is a self-hosted coding task inbox that runs local agents in isolated Git worktrees and returns verified patches.">
  <title>{% block title %}DeadDrop{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="public-body">
  <header class="public-nav">
    <a class="brand brand-lockup" href="/" aria-label="DeadDrop home"><span class="brand-mark">D</span><span>DeadDrop</span></a>
    <nav aria-label="Public navigation">
      <a href="/docs">Docs</a>
      <a href="/docs/architecture">Architecture</a>
      <a href="/blog">Blog</a>
      <a href="/updates">Updates</a>
    </nav>
    <a class="nav-button" href="/login">Open dashboard</a>
  </header>
  <main class="public-shell">
    {% block content %}{% endblock %}
  </main>
  <footer class="public-footer">
    <div>
      <a class="brand brand-lockup" href="/"><span class="brand-mark">D</span><span>DeadDrop</span></a>
      <p>Self-hosted. Local-first. Human-reviewed.</p>
    </div>
    <nav aria-label="Footer navigation">
      <a href="/docs">Documentation</a>
      <a href="/blog">Technical writing</a>
      <a href="https://github.com/haroon0x/DeadDrop">GitHub</a>
      <a href="https://github.com/haroon0x/DeadDrop/blob/main/SECURITY.md">Security</a>
    </nav>
  </footer>
</body>
</html>
