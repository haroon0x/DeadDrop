{% extends "base.html" %}
{% block title %}{{ job.title }}{% endblock %}
{% block content %}
<section class="job-head">
  <div>
    <p class="eyebrow">Job #{{ job.id }}</p>
    <h1>{{ job.title }}</h1>
  </div>
  <span class="badge {{ job.status }}">{{ job.status }}</span>
</section>

<section class="panel">
  <h2>Prompt</h2>
  <p class="prompt">{{ job.prompt }}</p>
</section>

<div id="receipt" data-job-id="{{ job.id }}">
  {% include "_job_receipt.html" %}
</div>

<script>
  const receipt = document.getElementById("receipt");
  async function refreshReceipt() {
    const res = await fetch(`/jobs/${receipt.dataset.jobId}/fragment${window.location.search}`, { credentials: "same-origin" });
    if (res.ok) receipt.innerHTML = await res.text();
  }
  setInterval(refreshReceipt, 2000);
</script>
{% endblock %}
